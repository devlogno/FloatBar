<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FloatBar Settings</title>
    <style>
        :root {
            --primary: #ff7300;
            --primary-hover: #ff851a;
            --bg: #ffffff;
            --text: #1c1c1e;
            --text-muted: #8e8e93;
            --border: #e5e5ea;
            --card-bg: #f2f2f7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1c1e;
                --text: #ffffff;
                --text-muted: #8e8e93;
                --border: #38383a;
                --card-bg: #2c2c2e;
            }
        }
        body { 
            width: 300px; 
            font-family: -apple-system, BlinkMacSystemFont, 'Outfit', 'Inter', sans-serif; 
            padding: 20px; 
            margin: 0; 
            color: var(--text); 
            background: var(--bg);
            user-select: none;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .header img {
            width: 32px;
            height: 32px;
        }
        .header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .control-group {
            background: var(--card-bg);
            padding: 14px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .control-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }
        .control-value {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(255, 115, 0, 0.3);
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 14px;
            border-radius: 14px;
        }
        .toggle-label {
            font-size: 14px;
            font-weight: 500;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--border);
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary);
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.4;
        }
        .footer b { color: var(--text); }
        .footer .highlight {
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255, 115, 0, 0.4);
            transition: all 0.2s ease;
            display: inline-block;
            padding: 0 4px;
        }
        .footer .highlight:hover {
            text-shadow: 0 0 15px rgba(255, 115, 0, 0.8);
            transform: scale(1.05);
        }
        .footer .highlight.copied {
            color: #34c759;
            text-shadow: 0 0 10px rgba(52, 199, 89, 0.4);
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .action-buttons button {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(255, 115, 0, 0.3);
        }
        .action-buttons button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(255, 115, 0, 0.4);
        }
        .action-buttons button:active {
            transform: translateY(0);
            box-shadow: 0 1px 3px rgba(255, 115, 0, 0.2);
        }
        #open-pip-btn {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: none;
        }
        #open-pip-btn:hover {
            background: var(--border);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="images/icon48.png" alt="Logo">
        <h2 data-i18n="floatBarApps">FloatBar Apps</h2>
    </div>

    <div class="section">
        <div class="section-title" data-i18n="siteSettings">Site Settings</div>
        <div class="action-buttons">
            <button id="add-site-btn" data-i18n="addToFloatBarContextMenu">Add to FloatBar</button>
            <button id="open-pip-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M0 3.5A1.5 1.5 0 0 1 1.5 2h13A1.5 1.5 0 0 1 16 3.5v9a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 12.5zM1.5 3a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5z"/>
                    <path d="M8 8.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-5a.5.5 0 0 1-.5-.5z"/>
                </svg>
                <span data-i18n="pipButtonText">PiP</span>
            </button>
        </div>
    </div>

    <div class="section">
        <div class="section-title" data-i18n="handleAppearance">Handle Appearance</div>
        <div class="control-group">
            <div class="control-item">
                <div class="control-label">
                    <span data-i18n="opacity">Opacity</span>
                    <span class="control-value" id="opacity-val">80%</span>
                </div>
                <input type="range" id="opacity-slider" min="10" max="100" value="80">
            </div>
            <div class="control-item">
                <div class="control-label">
                    <span data-i18n="size">Size</span>
                    <span class="control-value" id="size-val">48px</span>
                </div>
                <input type="range" id="size-slider" min="30" max="120" value="48">
            </div>
                    <div class="toggle-item">
            <span class="toggle-label" data-i18n="enabledOnThisSite">Enabled on this site</span>
            <label class="switch">
                <input type="checkbox" id="site-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        </div>
    </div>

    <div class="footer">
        <span data-i18n="howToUseHelp">Move mouse to <b>right edge</b> to open.</span><br>
        <span data-i18n="emailIssue">Email: <b>lognodev7@gmail.com</b></span>
    </div>

    <script src="popup.js"></script>
</body>
</html>
